name: Omni Priority Stage

on:
  workflow_call:
    inputs:
      stage-name:
        description: GitHub Actions job name used for priority matching.
        required: true
        type: string
      runs-on:
        description: JSON value for the runner selector used by the stage job.
        required: false
        type: string
        default: '["self-hosted"]'
      job-timeout-minutes:
        description: Timeout for the stage job.
        required: false
        type: string
        default: "60"
      run-timeout-minutes:
        description: Timeout for the main run step when run-script is set.
        required: false
        type: string
        default: "60"
      container-image:
        description: Container image for the stage job.
        required: false
        type: string
        default: frankleeeee/sglang-omni:dev
      container-options:
        description: Container options for the stage job.
        required: false
        type: string
        default: --gpus all --rm -v /dev/shm:/dev/shm
      setup-action:
        description: Whether to run the shared omni setup action before scripts.
        required: false
        type: string
        default: "true"
      venv-name:
        description: Virtual environment name passed to the setup action.
        required: false
        type: string
        default: omni
      install-deps:
        description: install-deps input passed to the setup action.
        required: false
        type: string
        default: "false"
      pre-run-script:
        description: Optional shell script to run before the main stage script.
        required: false
        type: string
        default: ""
      run-script:
        description: Optional main shell script for the stage.
        required: false
        type: string
        default: ""
      save-cache-script:
        description: Optional shell script used to save stage cache.
        required: false
        type: string
        default: ""
      save-cache-always:
        description: Whether save-cache-script should run under always().
        required: false
        type: string
        default: "false"
      post-stage-label:
        description: If set, run omni-post-stage with this stage label.
        required: false
        type: string
        default: ""
      artifact-search-root:
        required: false
        type: string
        default: "/tmp"
      artifact-path-globs:
        required: false
        type: string
        default: ""
      artifact-upload-name:
        required: false
        type: string
        default: ""
      artifact-upload-path:
        required: false
        type: string
        default: ""
      artifact-if-no-files-found:
        required: false
        type: string
        default: ignore
      summary-only:
        required: false
        type: string
        default: "false"

jobs:
  priority-gate:
    name: priority gate
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-priority-gate
        with:
          github-token: ${{ github.token }}
          stage-name: ${{ inputs.stage-name }}

  run-stage:
    name: ${{ inputs.stage-name }}
    needs: priority-gate
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    timeout-minutes: ${{ fromJSON(inputs.job-timeout-minutes) }}
    container:
      image: ${{ inputs.container-image }}
      options: ${{ inputs.container-options }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        if: ${{ inputs.setup-action == 'true' }}
        with:
          venv-name: ${{ inputs.venv-name }}
          install-deps: ${{ inputs.install-deps }}

      - name: Prepare stage
        if: ${{ inputs.pre-run-script != '' }}
        shell: bash
        env:
          OMNI_CI_STAGE_LABEL: ${{ inputs.stage-name }}
        run: ${{ inputs.pre-run-script }}

      - name: Run stage
        if: ${{ inputs.run-script != '' }}
        timeout-minutes: ${{ fromJSON(inputs.run-timeout-minutes) }}
        shell: bash
        env:
          OMNI_CI_STAGE_LABEL: ${{ inputs.stage-name }}
        run: ${{ inputs.run-script }}

      - name: Post-stage cleanup
        if: ${{ always() && inputs.post-stage-label != '' }}
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: ${{ inputs.post-stage-label }}
          artifact-search-root: ${{ inputs.artifact-search-root }}
          artifact-path-globs: ${{ inputs.artifact-path-globs }}
          artifact-upload-name: ${{ inputs.artifact-upload-name }}
          artifact-upload-path: ${{ inputs.artifact-upload-path }}
          artifact-if-no-files-found: ${{ inputs.artifact-if-no-files-found }}
          summary-only: ${{ inputs.summary-only }}

      - name: Save cache
        if: ${{ inputs.save-cache-script != '' && inputs.save-cache-always != 'true' }}
        shell: bash
        run: ${{ inputs.save-cache-script }}

      - name: Save cache
        if: ${{ always() && inputs.save-cache-script != '' && inputs.save-cache-always == 'true' }}
        shell: bash
        run: ${{ inputs.save-cache-script }}
