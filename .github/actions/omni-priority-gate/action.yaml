name: Omni priority gate
description: Wait normal-priority CI behind active high-priority PR CI work.

inputs:
  github-token:
    description: Token used to query workflow runs, jobs, and PR labels.
    required: true
  stage-name:
    description: Optional GitHub Actions job name to gate independently.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Wait behind high-priority CI
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        OMNI_CI_PRIORITY_STAGE: ${{ inputs.stage-name }}
      run: python .github/scripts/ci_priority_gate.py
